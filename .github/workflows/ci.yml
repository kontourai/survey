name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: survey

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: survey/package-lock.json

      - name: Install
        run: npm ci
        working-directory: survey

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: survey

      - name: Verify
        run: npm run verify
        working-directory: survey
